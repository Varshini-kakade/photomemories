{% extends 'index.html' %}

{% block content %}

<head>
    <title>Contact Us</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        .contact-section {
            background: #f4f6f9;
            padding: 60px 0;
        }

        .contact-card {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .contact-info {
            background: #343a40;
            color: white;
            border-radius: 10px;
            padding: 30px;
            height: 100%;
        }

        .contact-info i {
            font-size: 22px;
            margin-right: 10px;
        }

        .btn-contact {
            background: #ff6b6b;
            color: white;
            border: none;
        }

        .btn-contact:hover {
            background: #ff4b4b;
        }
    </style>

</head>


<div class="contact-section">

    <div class="container">

        <h2 class="text-center mb-5">Contact Us</h2>

        <div class="row">

            <!-- Contact Form -->

            <div class="col-md-7">

                <div class="contact-card">

                    <form method="post">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label class="form-label">Full Name</label>

                            <input type="text" class="form-control" placeholder="Enter your name" required>

                        </div>


                        <div class="mb-3">

                            <label class="form-label">Email</label>

                            <input type="email" class="form-control" placeholder="Enter your email" required>

                        </div>


                        <div class="mb-3">

                            <label class="form-label">Phone</label>

                            <input type="text" class="form-control" placeholder="Enter phone number">

                        </div>


                        <div class="mb-3">

                            <label class="form-label">Message</label>

                            <textarea class="form-control" rows="4" placeholder="Write your message"></textarea>

                        </div>

                        <button type="submit" class="btn btn-contact w-100">Send Message</button>

                    </form>

                </div>

            </div>


            <!-- Contact Info -->

            <div class="col-md-5">

                <div class="contact-info">

                    <h4 class="mb-4">Get in Touch</h4>

                    <p><i class="fa fa-map-marker"></i> Bangalore, India</p>

                    <p><i class="fa fa-phone"></i> +91 9876543210</p>

                    <p><i class="fa fa-envelope"></i> photomemories@gmail.com</p>

                    <hr>

                    <h5>Follow Us</h5>

                    <i class="fab fa-facebook fa-2x me-3"></i>

                    <i class="fab fa-instagram fa-2x me-3"></i>

                    <i class="fab fa-twitter fa-2x"></i>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
